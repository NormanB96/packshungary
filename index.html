<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#071c34">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Skypack</title>

<style>
* {
    box-sizing: border-box;
}

/* alap */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

/* TELJES háttér */
body {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: white;

    background: radial-gradient(circle at top, #163d6b 0%, #071c34 75%);
    overflow: hidden;
}

/* felső szöveg */
.header {
    margin-top: 5svh;
    text-align: center;
    z-index: 2;
}

.header h1,
.header h2 {
    font-size: 22px;
    font-weight: 300;
    margin: 0;
    letter-spacing: 1px;
}

.header h2 {
    margin-top: 6px;
}

/* KÖZÉPSŐ BLOKK – IDE JÖN A PDF (a kép helyére) */
.viewer {
    flex: 1;
    width: 100%;
    max-width: 1200px;

    display: flex;
    align-items: center;
    justify-content: center;

    padding: 16px;
}

/* PDF KÁRTYA */
.pdf-card {
    width: 100%;
    height: 100%;

    max-height: 65svh;

    border-radius: 16px;
    overflow: hidden;

    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    background: #ffffff; /* a PDF saját háttere */
}

/* PDF */
.pdf-card iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* landscape */
@media (orientation: landscape) {
    .header {
        margin-top: 3svh;
    }

    .pdf-card {
        max-height: 55svh;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>Stay Tuned</h1>
    <h2>Skypack is coming 🚀</h2>
</div>

<div class="viewer">
    <div class="pdf-card">
        <iframe src="skypack_katalogus_v5.pdf"></iframe>
    </div>
</div>

</body>
</html>
