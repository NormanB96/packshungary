l<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#071c34">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Skypack</title>

<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

body {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: white;

    background: radial-gradient(circle at top, #163d6b 0%, #071c34 75%);
}

/* felső szöveg */
.header {
    padding-top: env(safe-area-inset-top);
    margin-top: 4svh;
    text-align: center;
}

.header h1,
.header h2 {
    font-size: 22px;
    font-weight: 300;
    margin: 0;
    letter-spacing: 1px;
}

.header h2 {
    margin-top: 6px;
}

/* PDF konténer */
.pdf-wrapper {
    flex: 1;
    margin-top: 2svh;
    padding-bottom: env(safe-area-inset-bottom);
}

/* PDF megjelenítés */
.pdf-wrapper embed {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<div class="header">
    <h1>Stay Tuned</h1>
    <h2>Skypack is coming 🚀</h2>
</div>

<div class="pdf-wrapper">
    <embed src="skypack_katalogus_v5.pdf" type="application/pdf">
</div>

</body>
</html>
