<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#071c34">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Skypack</title>

<style>
* {
    box-sizing: border-box;
}

/* alap */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

/* TELJES KIJELZŐ */
body {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;

    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: #ffffff;

    /* FONT ÉLESSÉG */
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;

    background: radial-gradient(circle at top, #163d6b 0%, #071c34 75%);
}

/* SZÖVEG – SEMMI ANIMÁCIÓ */
.header {
    margin-top: 5svh;
    text-align: center;
}

.header h1,
.header h2 {
    font-size: 22px;
    font-weight: 300;
    margin: 0;
    letter-spacing: 1px;
}

.header h2 {
    margin-top: 6px;
}

/* KÉP */
.hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
}

.hero-img {
    max-width: 92%;
    max-height: 65svh;
    height: auto;

    border-radius: 16px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);

    /* CSAK A KÉP ANIMÁLÓDIK */
    animation: float 6s ease-in-out infinite;
}

/* lebegés */
@keyframes float {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

/* landscape */
@media (orientation: landscape) {
    .header {
        margin-top: 3svh;
    }
    .hero-img {
        max-height: 55svh;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>Stay Tuned</h1>
    <h2>Skypack is coming 🚀</h2>
</div>

<div class="hero">
    <img class="hero-img" src="IMG_1317.jpeg" alt="Skypack">
</div>

</body>
</html>
