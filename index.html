<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#071c34">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Skypack</title>

<style>

html, body{
margin:0;
padding:0;
height:100%;
}

body{
min-height:100svh;
display:flex;
flex-direction:column;
align-items:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
color:white;

background:radial-gradient(circle at top,#163d6b 0%,#071c34 75%);
}

.header{
margin-top:6svh;
text-align:center;
}

.header h1,
.header h2{
font-size:22px;
font-weight:300;
margin:0;
letter-spacing:1px;
}

.header h2{
margin-top:6px;
}

.hero{
flex:1;
display:flex;
align-items:center;
justify-content:center;
width:100%;
}

.hero-img{
max-width:92%;
max-height:65svh;
border-radius:16px;
box-shadow:0 30px 80px rgba(0,0,0,0.55);
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-14px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<div class="header">
<h1>Stay Tuned</h1>
<h2>Skypack is coming 🚀</h2>
</div>

<div class="hero">
<img class="hero-img" src="IMG_1317.jpeg">
</div>

</body>
</html>
