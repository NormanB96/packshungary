<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skypack</title>

<style>

html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    text-align:center;
    color:white;

    background: radial-gradient(circle at top,#163d6b 0%,#071c34 70%);
}

/* SZÖVEG BLOKK – felső harmad */
.text-container{
    position:absolute;
    top:18%;
    width:100%;
}

/* szövegek */
h1, h2{
    font-size:24px;
    font-weight:300;
    margin:0;
    letter-spacing:1px;
}

h2{
    margin-top:6px;
}

/* kép középen */
.image-container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-40%);
}

.hero-img{
    max-width:92vw;
    max-height:65vh;
    border-radius:16px;
    box-shadow:0 30px 80px rgba(0,0,0,0.55);
    animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-14px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<div class="text-container">
    <h1>Stay Tuned</h1>
    <h2>Skypack is coming 🚀</h2>
</div>

<div class="image-container">
    <img class="hero-img" src="IMG_1317.jpeg" alt="Skypack">
</div>

</body>
</html>
