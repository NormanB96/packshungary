<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skypack</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial, Helvetica, sans-serif;
text-align:center;

/* kék háttér */
background: radial-gradient(circle at top,#163d6b,#071c34);

color:white;
}

h1{
font-size:60px;
margin-bottom:10px;
letter-spacing:2px;
}

p{
font-size:24px;
margin-bottom:40px;
opacity:0.9;
}

/* kép */
.hero-img{
max-width:90%;
max-height:65vh;
border-radius:16px;

/* glow effekt */
box-shadow:0 30px 80px rgba(0,0,0,0.6);

/* kis animáció */
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}
}

</style>

</head>

<body>

<h1>Stay Tuned</h1>
<p>Skypack is coming 🚀</p>

<img class="hero-img" src="IMG_1317.jpeg">

</body>
</html>
