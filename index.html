<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iPhone notch / Dynamic Island támogatás -->
  <meta name="theme-color" content="#071c34">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Skypack</title>

  <style>
    @viewport {
      width: device-width;
      viewport-fit: cover;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: white;
      background: radial-gradient(circle at top, #163d6b 0%, #071c34 75%);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      padding-top: env(safe-area-inset-top);
    }

    .header {
      margin-top: calc(20px + env(safe-area-inset-top));
      text-align: center;
      padding: 0 20px;
      width: 100%;
      max-width: 420px;
    }

    .header h1 {
      font-size: clamp(28px, 7vw, 38px);
      font-weight: 300;
      letter-spacing: 0.8px;
      margin: 0;
    }

    .header h2 {
      font-size: clamp(18px, 4.5vw, 22px);
      font-weight: 300;
      margin-top: 8px;
      opacity: 0.9;
      letter-spacing: 0.5px;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 16px;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    .hero-img-wrapper {
      position: relative;
      width: 100%;
      max-width: 380px;
      aspect-ratio: 9 / 19.5;          /* kb iPhone arány */
      overflow: hidden;
      border-radius: 36px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;

      /* Kezdeti állapot – rejtve */
      opacity: 0;
      transform: scale(1.04) translateY(40px);
      transition: all 0s; /* hogy ne legyen azonnali ugrás */

      animation: reveal 1.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      animation-delay: 300ms;
    }

    @keyframes reveal {
      0% {
        opacity: 0;
        transform: scale(1.04) translateY(60px);
      }
      60% {
        opacity: 0.4;
        transform: scale(1.02) translateY(20px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Finom lebegés utána */
    .hero-img-wrapper:hover .hero-img,
    .hero-img-wrapper:active .hero-img {
      animation: float 7s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100%   { transform: translateY(0);   }
      50%        { transform: translateY(-14px); }
    }

    @media (max-width: 380px) {
      .hero-img-wrapper {
        border-radius: 24px;
        max-width: 340px;
      }
    }
  </style>
</head>

<body>
